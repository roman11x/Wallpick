name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: sudo apt-get install -y rpm
      - run: chmod +x gradlew && ./gradlew packageRpm
      - uses: actions/upload-artifact@v4
        with:
          name: wallpick-linux
          path: composeApp/build/compose/binaries/main/rpm/*.rpm

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew packageMsi
      - uses: actions/upload-artifact@v4
        with:
          name: wallpick-windows
          path: composeApp/build/compose/binaries/main/msi/*.msi

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wallpick-linux
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: wallpick-windows
          path: artifacts/
      - run: gh release create ${{ github.ref_name }} artifacts/* --title "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
